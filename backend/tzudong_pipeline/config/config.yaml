# ============================================
# 🍜 Tzudong Pipeline Configuration
# ============================================

# 파이프라인 기본 설정
pipeline:
  name: "tzudong-pipeline"
  version: "2.0.0"
  environment: "development" # development, staging, production
  timezone: "Asia/Seoul"

# ============================================
# 📺 유튜버 채널 설정
# ============================================
channels:
  # 기본 타겟 채널
  default: "tzuyang"

  # 채널 목록 (channels.yaml에서 상세 설정)
  targets:
    - tzuyang
    - jeongyukwang

# ============================================
# 🤖 Gemini CLI 설정
# ============================================
gemini:
  # 모델 설정
  model: "gemini-2.0-flash-exp" # gemini-2.0-flash-exp, gemini-1.5-pro, gemini-1.5-flash

  # Rate Limit 설정
  rate_limit:
    requests_per_minute: 60
    requests_per_day: 1000
    delay_between_requests: 1.0 # 초

  # 재시도 설정
  retry:
    max_attempts: 5
    initial_delay: 2.0 # 초
    backoff_multiplier: 2.0

# ============================================
# ⚡ 병렬 처리 설정
# ============================================
parallel:
  # 브랜치별 동시 실행 워커 수
  branch1_workers: 3 # 메타데이터 수집
  branch2_workers: 2 # 네이버지도 크롤링 (Puppeteer 리소스 고려)
  branch3_workers: 5 # 자막 수집
  branch4_workers: 3 # 히트맵 수집

  # AI 처리
  ai_crawling_workers: 2 # Gemini CLI 크롤링
  ai_evaluation_workers: 2 # Gemini CLI 평가

  # DB 작업
  db_insert_batch_size: 50 # 한 번에 삽입할 레코드 수

# ============================================
# 🔐 인증 설정
# ============================================
auth:
  # Gemini OAuth (환경변수 또는 .gemini/oauth_creds.json에서 로드)
  gemini:
    credentials_path: ".gemini/oauth_creds.json"
    use_env_token: true # true면 환경변수에서 토큰 로드

  # GitHub
  github:
    use_token: true

# ============================================
# 💾 데이터베이스 설정
# ============================================
database:
  # 기본 저장소
  primary: "oracle" # oracle, supabase

  # Oracle 설정
  oracle:
    enabled: true
    pool_size: 5
    max_overflow: 10

  # Supabase 설정 (동기화용)
  supabase:
    enabled: true
    sync_enabled: true
    sync_interval: 3600 # 초 (1시간)

# ============================================
# 📊 데이터 수집 설정
# ============================================
collection:
  # 주기적 수집 간격 (초)
  metadata_interval: 86400 # 1일
  transcript_interval: 604800 # 7일
  heatmap_interval: 604800 # 7일

  # 수집 범위
  max_videos_per_channel: null # null = 전체, 숫자 = 최근 N개
  include_shorts: false
  include_live: false

  # 필터링
  min_duration: 60 # 최소 영상 길이 (초)
  max_duration: null # 최대 영상 길이 (null = 무제한)

# ============================================
# 🔍 검색 API 설정
# ============================================
search:
  # 검색 전략 우선순위
  strategies:
    - "name_address" # name + 전체 주소
    - "name_district" # name + 시군구
    - "name_only" # name만

  # 결과 설정
  max_results: 10
  min_confidence: 0.7

# ============================================
# 📝 로깅 설정
# ============================================
logging:
  level: "INFO" # DEBUG, INFO, WARNING, ERROR
  format: "%(asctime)s [%(levelname)s] %(name)s: %(message)s"

  # 파일 로깅
  file:
    enabled: true
    path: "data/logs"
    max_size_mb: 10
    backup_count: 5

  # 콘솔 로깅
  console:
    enabled: true
    colored: true

# ============================================
# 🚀 GitHub Actions 설정
# ============================================
github_actions:
  enabled: true

  # 스케줄 (cron)
  schedules:
    branch1_metadata: "0 0 * * *" # 매일 00:00 UTC
    branch3_transcript: "0 6 * * 0" # 매주 일요일 06:00 UTC
    branch4_heatmap: "0 12 * * 0" # 매주 일요일 12:00 UTC
    ai_processing: "0 18 * * *" # 매일 18:00 UTC
