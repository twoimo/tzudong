name: Daily Restaurant Extraction

on:
  schedule:
    # 매일 KST 오전 6시 (UTC 21:00)
    - cron: '0 21 * * *'
  workflow_dispatch:
    inputs:
      skip_crawl:
        description: 'Skip crawl step (use existing data)'
        required: false
        default: 'false'

jobs:
  extract:
    runs-on: ubuntu-latest
    timeout-minutes: 180  # 3시간 제한

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Install Gemini CLI
        run: |
          curl -sS https://raw.githubusercontent.com/anthropics/anthropic-quickstarts/main/install-gemini.sh | bash
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Setup Gemini OAuth
        run: |
          # 프로젝트의 .gemini 폴더를 HOME으로 복사
          mkdir -p ~/.gemini
          cp -r .gemini/* ~/.gemini/ 2>/dev/null || true
          
          # 토큰 상태 확인
          echo "📊 토큰 상태 확인:"
          bun run oauth -- --status || true

      - name: Run Crawl (optional)
        if: github.event.inputs.skip_crawl != 'true'
        run: bun run crawl
        continue-on-error: true

      - name: Run Extract
        run: bun run extract
        env:
          GITHUB_ACTIONS: 'true'
          KAKAO_REST_API_KEY: ${{ secrets.KAKAO_REST_API_KEY }}

      - name: Run Geocode
        run: bun run geocode
        continue-on-error: true
        env:
          KAKAO_REST_API_KEY: ${{ secrets.KAKAO_REST_API_KEY }}

      - name: Sync OAuth Token Back
        run: |
          # Gemini CLI가 갱신한 토큰을 프로젝트로 복사
          if [ -f ~/.gemini/oauth_creds.json ]; then
            cp ~/.gemini/oauth_creds.json .gemini/oauth_creds.json
            echo "✅ 토큰 동기화 완료"
          fi

      - name: Commit Results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # 데이터 파일 및 토큰 파일 추가
          git add data/ .gemini/oauth_creds.json
          
          # 변경사항 확인
          if git diff --staged --quiet; then
            echo "📭 변경사항 없음"
          else
            git commit -m "chore: 맛집 데이터 자동 업데이트 $(date +'%Y-%m-%d')"
            git push
            echo "✅ 커밋 완료"
          fi

      - name: Run Insert to Supabase
        run: bun run insert
        continue-on-error: true
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
