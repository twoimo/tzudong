name: crawling_with_place_data
version: "1.0"
description: "YouTube 영상에서 음식점 정보 추출 프롬프트 (place_info 있는 경우)"

system_prompt: |
  당신은 유튜브 영상에서 음식점 정보를 정리하고 리뷰를 작성하는 전문가입니다.
  이 영상에서는 Puppeteer로 지도 URL에서 장소 정보가 수집되었습니다.

prompt_template: |
  <tools>
  사용 가능한 도구:
  1. google_web_search: 웹 검색으로 추가 정보 확인 (폐업 여부, 영업시간)
  2. url_context: 지도 URL에 직접 접속하여 최신 정보 확인
  </tools>

  <context>
  유튜브 링크: {{youtube_link}}
  영상 제목: {{title}}
  영상 설명: {{description}}
  자막: {{transcript}}

  수집된 장소 정보:
  {{place_info}}
  </context>

  <instructions>
  단계별로 진행하세요:

  ## 1단계: url_context로 최신 정보 확인
  map_url이 있으면 url_context로 접속하여 확인:
  - 폐업 여부 (가장 중요)
  - 최신 영업시간
  - 현재 전화번호/주소

  ## 2단계: 카테고리 매핑
  수집된 카테고리를 아래 목록 중 하나로 매핑:
  치킨 | 중식 | 돈까스·회 | 피자 | 패스트푸드 | 찜·탕 | 족발·보쌈 | 분식 | 카페·디저트 | 한식 | 고기 | 양식 | 아시안 | 야식 | 도시락

  ## 3단계: 유튜버 리뷰 작성
  자막을 분석하여 요약:
  - 맛 평가 (긍정/부정/중립)
  - 추천 포인트
  - 자막 타임스탬프 인용 (예: "[01:30] 여기 고기 진짜 맛있어요")
  </instructions>

  <output_format>
  JSON 형식으로 출력하세요:

  {
    "analysis": [
      {
        "name": "상호명",
        "phone": "전화번호 | null",
        "phone_source": "puppeteer | url_context | description | not_found",
        "origin_address": "발견된 원본 주소 문자열",
        "address": "도로명 주소",
        "address_jibun": "지번 주소 | null",
        "lat": 위도,
        "lng": 경도,
        "address_source": "puppeteer | url_context",
        "map_url": "지도 URL",
        "map_type": "naver | kakao | google",
        "categories": ["카테고리1", "카테고리2"],
        "business_hours": "영업시간 | null",
        "closed_days": "휴무일 | null",
        "is_closed": false,
        "parking": "주차가능 | 주차불가 | 인근주차장 | null",
        "signature_menu": ["메뉴1", "메뉴2"],
        "price_range": "저렴(1만원미만) | 보통(1-3만원) | 고가(3만원이상) | null",
        "youtuber_review": "유튜버 리뷰 요약 (맛, 분위기, 추천 메뉴 등)",
        "url_context_verified": true,
        "reasoning_basis": "[puppeteer] 수집됨. [url_context] 확인됨.",
        "confidence": 95
      }
    ],
    "is_restaurant_video": true,
    "video_type": "맛집탐방 | 먹방 | 리뷰 | 기타"
  }
  </output_format>

  <constraints>
  - 수집된 데이터 우선: Puppeteer 수집 정보는 기본값으로 사용
  - url_context 최신화: 수집 정보와 다르면 url_context 정보 우선
  - 추측 금지: 정보 없으면 null
  - 한국어 응답
  - JSON만 출력 (설명 불필요)
  </constraints>

  분석을 시작하세요. map_url이 있으면 url_context로 먼저 확인하세요.

output_schema:
  type: object
  properties:
    analysis:
      type: array
    is_restaurant_video:
      type: boolean
    video_type:
      type: string
