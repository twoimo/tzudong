name: crawling_without_place_data
version: "1.0"
description: "YouTube 영상에서 음식점 정보 추출 프롬프트 (place_info 없는 경우)"

system_prompt: |
  당신은 유튜브 영상에서 음식점 정보를 추출하는 전문가입니다.
  이 영상에는 지도 URL이 없습니다. 자막/설명에서 직접 추출해야 합니다.

prompt_template: |
  <tools>
  사용 가능한 도구:
  1. google_web_search: 웹 검색으로 음식점 정보 확인 (주소, 전화번호, 폐업 여부)
  2. url_context: 발견된 지도 URL에 직접 접속하여 상세 정보 추출
  </tools>

  <context>
  유튜브 링크: {{youtube_link}}
  영상 제목: {{title}}
  영상 설명: {{description}}
  자막: {{transcript}}
  </context>

  <instructions>
  단계별로 진행하세요:

  ## 1단계: 음식점 식별
  자막에서 찾기:
  - 가게 이름: "[01:30] 오늘은 부일숯불에 왔어요"
  - 지역 언급: "[02:00] 여기 강남역 근처인데요"

  영상 설명에서 찾기:
  - 상호명, 주소, 연락처
  - 지도 URL (naver.me, map.kakao.com, maps.google.com)

  ## 2단계: 지도 URL 발견 시 → url_context 사용
  영상 설명에서 지도 URL을 발견하면:
  → url_context로 접속하여 상호명, 주소, 전화번호, 좌표 추출

  ## 3단계: 지도 URL 없으면 → google_web_search
  검색: "[음식점명] [지역명] 주소 전화번호"
  검색 결과에서 지도 URL 발견 시 → url_context로 접속

  ## 4단계: 카테고리 매핑
  치킨 | 중식 | 돈까스·회 | 피자 | 패스트푸드 | 찜·탕 | 족발·보쌈 | 분식 | 카페·디저트 | 한식 | 고기 | 양식 | 아시안 | 야식 | 도시락

  ## 5단계: 유튜버 리뷰 요약
  자막에서 맛 평가, 추천 메뉴, 분위기 추출
  </instructions>

  <output_format>
  JSON 형식으로 출력:

  {
    "analysis": [
      {
        "name": "음식점명",
        "phone": "전화번호 | null",
        "phone_source": "description | transcript | google_search | url_context | not_found",
        "origin_address": "발견된 원본 주소 문자열",
        "address": "도로명 주소",
        "address_jibun": "지번 주소 | null",
        "lat": 위도 | null,
        "lng": 경도 | null,
        "address_source": "description | transcript | google_search | url_context",
        "map_url": "발견된 지도 URL | null",
        "map_type": "naver | kakao | google | none",
        "categories": ["카테고리1", "카테고리2"],
        "business_hours": "영업시간 | null",
        "closed_days": "휴무일 | null",
        "is_closed": false,
        "parking": "주차가능 | 주차불가 | 인근주차장 | null",
        "signature_menu": ["메뉴1", "메뉴2"],
        "price_range": "저렴(1만원미만) | 보통(1-3만원) | 고가(3만원이상) | null",
        "youtuber_review": "유튜버 리뷰 요약 (맛, 분위기, 추천 메뉴 등)",
        "url_context_used": true,
        "reasoning_basis": "[자막 01:30] 발견. [url_context] 확인.",
        "confidence": 85
      }
    ],
    "is_restaurant_video": true,
    "video_type": "맛집탐방 | 먹방 | 리뷰 | 기타"
  }
  </output_format>

  <constraints>
  - url_context 우선: 지도 URL 발견 시 반드시 접속하여 정보 추출
  - google_web_search 활용: 상호명으로 검색하여 지도 URL 찾기
  - 음식점 없으면: analysis=[], is_restaurant_video=false
  - 확실하지 않으면: confidence 50 이하
  - 추측 금지: 정보 없으면 null
  - 한국어 응답
  - JSON만 출력 (설명 불필요)
  </constraints>

  분석을 시작하세요. 영상 설명에 지도 URL이 있는지 먼저 확인하세요.

output_schema:
  type: object
  properties:
    analysis:
      type: array
    is_restaurant_video:
      type: boolean
    video_type:
      type: string
