name: evaluation
version: "1.0"
description: "음식점 데이터 품질 평가 프롬프트 (5개 평가 항목)"

system_prompt: |
  당신은 유튜버의 음식점 방문 관련 AI 기반 생성 데이터를 평가하는 전문가입니다.

prompt_template: |
  입력으로 주어지는 <평가할 데이터>는 한 유튜브 영상에서 유튜버가 방문한 음식점 데이터(restaurant 리스트 포함)입니다.
  영상 내용, reasoning_basis, youtuber_review, category를 종합적으로 검토하여 아래의 5개 평가 항목에 대해 판단하세요.

  **참고: 프롬프트 끝에 <참고: YouTube 자막> 섹션이 제공됩니다. 타임스탬프([MM:SS])와 함께 제공되므로 유튜버의 실제 발언, 음식점 언급, 리뷰 내용을 검증하는 데 적극 활용하세요.**

  **중요1: 추측이나 새로운 정보 추가는 절대 금지하며, 반드시 아래 <평가 루브릭>의 평가기준·평가대상·출력형식을 그대로 따르세요.**
  **중요2: 출력 결과값은 한국어로 작성합니다. 단, 고유명사(음식점 이름 등)는 원본 그대로 유지합니다.**

  <평가할 데이터>
  {{restaurant_data}}
  </평가할 데이터>

  <평가 루브릭>
  - **평가는 새로운 항목이나 근거를 추가하지 말고, <평가할 데이터>와 <참고: YouTube 자막>을 기반으로만 판단하세요.**
  - 모든 평가항목에서 eval_basis는 **자막 타임스탬프([MM:SS])를 포함하여 구체적으로** 작성합니다.

  [평가 항목 1] 방문 여부 정확성 (visit_authenticity)
  - 평가 목적: 유튜버가 실제로 해당 음식점을 방문했는지 평가
  - 평가 기준(int 0~4):
    0 = 자막에서 전혀 언급 없음 (데이터가 허구)
    1 = 음식점이 맞으며, 직접 방문했고 지점명까지 명확
    2 = 음식점이 맞으며, 직접 방문은 맞지만, 지점명 특정 불명확함
    3 = 음식점을 방문하지 않고, 해당 음식점의 음식 포장/배달임
    4 = 언급만 하거나(매장 안 감), 음식점이 아님

  [평가 항목 2] reasoning_basis 추론 합리성 (rb_inference_score)
  - 평가 기준(int 0~2):
    0 = 논리적 비약 있음 / 자막에서 확인 안 되는 내용으로 추측
    1 = '방문 지역 언급 → 간판/편집자막 확인 → 음식점 특정' 순서로 자연스럽게 이어짐
    2 = 위 구조는 아니지만, 자막 내용과 검색정보를 조합하여 논리적으로 특정

  [평가 항목 3] reasoning_basis 실제 근거 일치도 (rb_grounding_TF)
  - 평가 기준(bool):
    true = reasoning_basis의 핵심 근거가 자막에서 확인됨
    false = 핵심 근거가 자막에서 전혀 확인 안 됨

  [평가 항목 4] 음식 리뷰 충실도 (review_faithfulness_score)
  - 평가 기준(float 0~1):
    0.0 = 자막에 없는 내용 지어냄, 과장/왜곡
    1.0 = 자막의 실제 멘트 기반으로 충실하게 요약됨

  [평가 항목 5] 카테고리 정합성 (category_TF)
  - 평가 기준(bool):
    true = 자막에서 확인되는 메뉴/업장 유형과 category가 일치
    false = 자막에서 전혀 맞지 않음 (수정 필요)
  - 카테고리 범위: ["치킨", "중식", "돈까스·회", "피자", "패스트푸드", "찜·탕", "족발·보쌈", "분식", "카페·디저트", "한식", "고기", "양식", "아시안", "야식", "도시락"]
  </평가 루브릭>

  <출력 형식>
  최종 출력은 **반드시 5개의 평가 항목을 key로 하고, 그 평가 결과를 값으로 하는 단일 JSON 객체만 반환**:

  {
    "visit_authenticity": {"values": [{"origin_name": "음식점명", "eval_value": 1, "eval_basis": "근거"}], "missing": []},
    "rb_inference_score": [{"origin_name": "음식점명", "eval_value": 1, "eval_basis": "근거"}],
    "rb_grounding_TF": [{"origin_name": "음식점명", "eval_value": true, "eval_basis": "근거"}],
    "review_faithfulness_score": [{"origin_name": "음식점명", "eval_value": 1.0, "eval_basis": "근거"}],
    "category_TF": [{"origin_name": "음식점명", "eval_value": true, "category_revision": null}]
  }
  </출력 형식>

  ---
  <참고: YouTube 자막>
  [자막 언어: {{transcript_language}}]
  {{transcript}}
  </참고: YouTube 자막>

output_schema:
  type: object
  required:
    - visit_authenticity
    - rb_inference_score
    - rb_grounding_TF
    - review_faithfulness_score
    - category_TF
