name: 🍜 크롤링 + 평가 파이프라인

# 임시 비활성화 - restaurant-pipeline.yml에서 통합 관리
on:
  workflow_dispatch:
    inputs:
      disabled:
        description: '이 워크플로우는 비활성화되었습니다'
        required: false
        default: 'true'
  # push:
  #   branches:
  #     - github-actions-restaurant
  #   paths:
  #     - 'backend/geminiCLI-restaurant-crawling/data/**/tzuyang_restaurant_transcripts.json'

env:
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '20'
  TZ: 'Asia/Seoul'

jobs:
  # ============================
  # Transcript 존재 확인
  # ============================
  check-transcripts:
    runs-on: ubuntu-latest
    outputs:
      has_transcripts: ${{ steps.check.outputs.has_transcripts }}
      transcript_count: ${{ steps.check.outputs.transcript_count }}
    
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          ref: github-actions-restaurant
      
      - name: 🔍 Check Transcripts
        id: check
        run: |
          # 모든 날짜 폴더에서 transcript 파일 찾기
          TRANSCRIPT_FILES=$(find backend/geminiCLI-restaurant-crawling/data -name "tzuyang_restaurant_transcripts.json" 2>/dev/null || true)
          
          if [ -z "$TRANSCRIPT_FILES" ]; then
            echo "❌ Transcript 파일이 없습니다."
            echo "has_transcripts=false" >> $GITHUB_OUTPUT
            echo "transcript_count=0" >> $GITHUB_OUTPUT
          else
            # 전체 transcript 개수 계산
            TOTAL_COUNT=0
            for file in $TRANSCRIPT_FILES; do
              if [ -f "$file" ]; then
                COUNT=$(jq 'length' "$file" 2>/dev/null || echo "0")
                TOTAL_COUNT=$((TOTAL_COUNT + COUNT))
              fi
            done
            
            echo "✅ Transcript 파일 발견: $TOTAL_COUNT 개의 transcript"
            echo "has_transcripts=true" >> $GITHUB_OUTPUT
            echo "transcript_count=$TOTAL_COUNT" >> $GITHUB_OUTPUT
          fi

  # ============================
  # 크롤링 + 평가 파이프라인
  # ============================
  pipeline:
    needs: check-transcripts
    if: needs.check-transcripts.outputs.has_transcripts == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 180
    
    permissions:
      contents: write
    
    steps:
      # ============================
      # 1. 기본 환경 설정
      # ============================
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          ref: github-actions-restaurant
      
      - name: 🐍 Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: 'backend/requirements.txt'
      
      - name: 📦 Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/geminiCLI-restaurant-evaluation/package-lock.json
      
      # ============================
      # 2. 시스템 도구 설치
      # ============================
      - name: 🔧 Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq zsh
          echo "✅ jq 버전: $(jq --version)"
      
      # ============================
      # 3. Python 패키지 설치
      # ============================
      - name: 🐍 Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install requests python-dotenv google-api-python-client openai
          echo "✅ Python 패키지 설치 완료"
      
      # ============================
      # 4. Node.js 패키지 설치
      # ============================
      - name: 📦 Install Node.js dependencies (Evaluation)
        working-directory: backend/geminiCLI-restaurant-evaluation
        run: |
          npm install
          echo "✅ Node.js 패키지 설치 완료"
      
      # ============================
      # 5. Gemini CLI 설치
      # ============================
      - name: 🤖 Install Gemini CLI
        env:
          GEMINI_API_KEY: ${{ secrets.GOOGLE_API_KEY_BYEON }}
        run: |
          npm install -g @google/gemini-cli
          
          mkdir -p ~/.gemini
          cat > ~/.gemini/settings.json << EOF
          {
            "auth": { "type": "api-key" },
            "theme": "default",
            "sandbox": false,
            "yoloMode": true
          }
          EOF
          
          pip install google-generativeai
          echo "✅ Gemini CLI 설치 완료"
      
      # ============================
      # 6. 환경 변수 파일 생성
      # ============================
      - name: 📝 Create .env files
        run: |
          # 크롤링 .env
          cat > backend/geminiCLI-restaurant-crawling/.env << EOF
          GEMINI_API_KEY=${{ secrets.GOOGLE_API_KEY_BYEON }}
          GEMINI_API_KEY_BYEON=${{ secrets.GOOGLE_API_KEY_BYEON }}
          GOOGLE_API_KEY=${{ secrets.GOOGLE_API_KEY_BYEON }}
          YOUTUBE_API_KEY_BYEON=${{ secrets.YOUTUBE_API_KEY_BYEON }}
          OPENAI_API_KEY_BYEON=${{ secrets.OPENAI_API_KEY_BYEON }}
          EOF
          
          # 평가 .env
          cat > backend/geminiCLI-restaurant-evaluation/.env << EOF
          NAVER_CLIENT_ID_BYEON=${{ secrets.NAVER_CLIENT_ID_BYEON }}
          NAVER_CLIENT_SECRET_BYEON=${{ secrets.NAVER_CLIENT_SECRET_BYEON }}
          NCP_MAPS_KEY_ID_BYEON=${{ secrets.NCP_MAPS_KEY_ID_BYEON }}
          NCP_MAPS_KEY_BYEON=${{ secrets.NCP_MAPS_KEY_BYEON }}
          GEMINI_API_KEY_BYEON=${{ secrets.GOOGLE_API_KEY_BYEON }}
          GEMINI_API_KEY=${{ secrets.GOOGLE_API_KEY_BYEON }}
          GOOGLE_API_KEY=${{ secrets.GOOGLE_API_KEY_BYEON }}
          SUPABASE_URL=${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          EOF
          
          echo "✅ .env 파일 생성 완료"
      
      # ============================
      # 7. 스크립트 실행 권한
      # ============================
      - name: 🔐 Set script permissions
        run: |
          chmod +x backend/geminiCLI-restaurant-crawling/scripts/*.sh
          chmod +x backend/geminiCLI-restaurant-evaluation/scripts/*.sh
          echo "✅ 스크립트 실행 권한 부여 완료"
      
      # ============================
      # 8. 파이프라인 날짜 폴더 설정
      # ============================
      - name: 📅 Set Pipeline Date Folder
        run: |
          PIPELINE_DATE=$(date '+%y-%m-%d')
          echo "PIPELINE_DATE=$PIPELINE_DATE" >> $GITHUB_ENV
          echo "📅 파이프라인 날짜 폴더: $PIPELINE_DATE"
          
          mkdir -p backend/geminiCLI-restaurant-crawling/data/$PIPELINE_DATE
          mkdir -p backend/geminiCLI-restaurant-evaluation/data/$PIPELINE_DATE
          mkdir -p backend/log/geminiCLI-restaurant/report/$PIPELINE_DATE
          mkdir -p backend/log/geminiCLI-restaurant/text/$PIPELINE_DATE
          mkdir -p backend/log/geminiCLI-restaurant/structured/$PIPELINE_DATE
          mkdir -p backend/log/geminiCLI-restaurant/supabase/$PIPELINE_DATE
          echo "✅ 폴더 생성 완료"
      
      # ============================
      # 9. 크롤링 실행
      # ============================
      - name: 🍜 Run Crawling
        if: ${{ github.event.inputs.phase == 'all' || github.event.inputs.phase == 'crawling' || github.event_name == 'push' }}
        working-directory: backend/geminiCLI-restaurant-crawling/scripts
        env:
          GEMINI_API_KEY: ${{ secrets.GOOGLE_API_KEY_BYEON }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY_BYEON }}
          PIPELINE_DATE: ${{ env.PIPELINE_DATE }}
        run: |
          echo "🍜 크롤링 시작 (transcript 기반)..."
          echo "📅 파이프라인 날짜: $PIPELINE_DATE"
          bash crawling.sh
      
      # ============================
      # 10. 평가 실행
      # ============================
      - name: 📊 Run Evaluation
        if: ${{ github.event.inputs.phase == 'all' || github.event.inputs.phase == 'evaluation' || github.event_name == 'push' }}
        working-directory: backend/geminiCLI-restaurant-evaluation/scripts
        env:
          GEMINI_API_KEY: ${{ secrets.GOOGLE_API_KEY_BYEON }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY_BYEON }}
          PIPELINE_DATE: ${{ env.PIPELINE_DATE }}
        run: |
          echo "📊 평가 파이프라인 시작..."
          python3 evaluation-pipeline.py
      
      # ============================
      # 11. Transform 실행
      # ============================
      - name: 🔄 Run Transform
        if: ${{ github.event.inputs.phase == 'transform' }}
        working-directory: backend/geminiCLI-restaurant-evaluation/scripts
        env:
          PIPELINE_DATE: ${{ env.PIPELINE_DATE }}
        run: |
          echo "🔄 Transform 단계 실행..."
          python3 transform_evaluation_results.py
      
      # ============================
      # 12. DB Insert 실행
      # ============================
      - name: 💾 Run DB Insert
        if: ${{ github.event.inputs.phase == 'insert' }}
        working-directory: backend/geminiCLI-restaurant-evaluation
        env:
          PIPELINE_DATE: ${{ env.PIPELINE_DATE }}
        run: |
          echo "💾 DB 삽입 단계 실행..."
          npx tsx scripts/insert_to_supabase.ts
      
      # ============================
      # 13. 결과 파일 업로드
      # ============================
      - name: 📊 Upload Results as Artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pipeline-results-${{ github.run_number }}
          path: |
            backend/geminiCLI-restaurant-crawling/data/**/*.jsonl
            backend/geminiCLI-restaurant-crawling/data/**/*.txt
            backend/geminiCLI-restaurant-evaluation/data/**/*.jsonl
          retention-days: 30
          if-no-files-found: warn
      
      # ============================
      # 14. 결과 커밋
      # ============================
      - name: 📤 Commit results
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          TODAY=$(date '+%y-%m-%d')
          
          git add backend/geminiCLI-restaurant-crawling/data/ 2>/dev/null || true
          git add backend/geminiCLI-restaurant-evaluation/data/ 2>/dev/null || true
          git add backend/log/geminiCLI-restaurant/ 2>/dev/null || true
          
          if git diff --staged --quiet; then
            echo "📭 변경사항 없음"
          else
            COMMIT_MSG="🤖 Auto: 크롤링+평가 완료 ($TODAY)"
            git commit -m "$COMMIT_MSG"
            git push
            echo "✅ 결과 커밋 완료"
          fi
      
      # ============================
      # 15. Job Summary
      # ============================
      - name: 📝 Generate Job Summary
        if: always()
        run: |
          echo "# 🍜 크롤링 + 평가 파이프라인 결과" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## 📅 실행 정보" >> $GITHUB_STEP_SUMMARY
          echo "- **실행 시간**: $(TZ=Asia/Seoul date '+%Y-%m-%d %H:%M:%S KST')" >> $GITHUB_STEP_SUMMARY
          echo "- **트리거**: ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Transcript 수**: ${{ needs.check-transcripts.outputs.transcript_count }} 개" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          echo "## 📊 처리 결과" >> $GITHUB_STEP_SUMMARY
          TODAY=$(date '+%y-%m-%d')
          
          CRAWL_FILE="backend/geminiCLI-restaurant-crawling/data/$TODAY/tzuyang_restaurant_results.jsonl"
          if [ -f "$CRAWL_FILE" ]; then
            COUNT=$(wc -l < "$CRAWL_FILE" | tr -d ' ')
            echo "- **크롤링 결과**: $COUNT 개" >> $GITHUB_STEP_SUMMARY
          fi
          
          EVAL_FILE="backend/geminiCLI-restaurant-evaluation/data/$TODAY/tzuyang_restaurant_evaluation_results.jsonl"
          if [ -f "$EVAL_FILE" ]; then
            COUNT=$(wc -l < "$EVAL_FILE" | tr -d ' ')
            echo "- **평가 성공**: $COUNT 개" >> $GITHUB_STEP_SUMMARY
          fi
          
          ERR_FILE="backend/geminiCLI-restaurant-evaluation/data/$TODAY/tzuyang_restaurant_evaluation_errors.jsonl"
          if [ -f "$ERR_FILE" ]; then
            COUNT=$(wc -l < "$ERR_FILE" | tr -d ' ')
            echo "- **평가 에러**: $COUNT 개" >> $GITHUB_STEP_SUMMARY
          fi

  # ============================
  # Transcript 없음 알림
  # ============================
  no-transcripts:
    needs: check-transcripts
    if: needs.check-transcripts.outputs.has_transcripts == 'false'
    runs-on: ubuntu-latest
    
    steps:
      - name: ⚠️ No Transcripts Found
        run: |
          echo "⚠️ Transcript 파일이 없어서 파이프라인을 스킵합니다."
          echo ""
          echo "Transcript를 수집하려면:"
          echo "1. 로컬에서 FastAPI 서버 실행"
          echo "2. UI에서 'Transcript 수집' 버튼 클릭"
          echo "3. GitHub에 자동 커밋됨"
          echo ""
          echo "커밋 후 이 워크플로우가 자동으로 다시 실행됩니다."
      
      - name: 📝 Generate Job Summary
        run: |
          echo "# ⚠️ Transcript 없음" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Transcript 파일이 없어서 파이프라인을 실행하지 않았습니다." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## 해결 방법" >> $GITHUB_STEP_SUMMARY
          echo "1. 로컬에서 FastAPI 서버 실행: \`uvicorn main:app --reload\`" >> $GITHUB_STEP_SUMMARY
          echo "2. UI에서 'Transcript 수집' 버튼 클릭" >> $GITHUB_STEP_SUMMARY
          echo "3. GitHub에 자동 커밋 후 이 워크플로우가 다시 실행됩니다." >> $GITHUB_STEP_SUMMARY
