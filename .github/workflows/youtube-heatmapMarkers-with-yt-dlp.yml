name: YouTube HeatmapMarkers Collection (yt-dlp)

on:
  schedule:
    # 하루 3번 실행 - 한국 시간 기준
    - cron: '0 0 * * *'   # 00:00 UTC = 한국 09:00
    - cron: '0 6 * * *'   # 06:00 UTC = 한국 15:00
    - cron: '0 12 * * *'  # 12:00 UTC = 한국 21:00
  workflow_dispatch:  # 수동 실행 가능

jobs:
  collect-heatmap-markers:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # push 권한 필요
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: feat/crawling-youtube-heat-map
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Setup Git
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git fetch origin feat/crawling-youtube-heat-map
          git checkout feat/crawling-youtube-heat-map
          git pull origin feat/crawling-youtube-heat-map
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install Python dependencies
        working-directory: backend/youtube-heatmapMarkers-with-yt-dlp
        run: |
          pip install -r requirements.txt
          # yt-dlp 최신 버전 확인
          yt-dlp --version
      
      - name: Collect YouTube URLs
        working-directory: backend/youtube-heatmapMarkers-with-yt-dlp
        env:
          YOUTUBE_API_KEY_BYEON: ${{ secrets.YOUTUBE_API_KEY_BYEON }}
        run: python scripts/collect_urls.py 10000
      
      - name: Collect HeatmapMarkers with yt-dlp (50개 제한)
        working-directory: backend/youtube-heatmapMarkers-with-yt-dlp
        env:
          MAX_URLS_PER_RUN: '50'
        run: npm run collect
