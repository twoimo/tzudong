name: Daily Data Collection

on:
  schedule:
    # 한국 시간(KST) 새벽 4시 = UTC 19:00
    - cron: '0 19 * * *'
  workflow_dispatch:
    inputs:
      max_videos:
        description: '자막 문맥 생성 개수 설정 (0=Unlimited, -1=Skip)'
        required: false
        default: '-1'
        type: string

permissions:
  contents: write

# [PERF] 동시 실행 방지 - 이전 실행 중이면 새 실행이 대기 (취소하지 않음)
# 이중 실행으로 인한 분 낭비와 git 충돌을 방지
concurrency:
  group: daily-crawl-pipeline
  cancel-in-progress: false

jobs:
  daily-crawl:
    runs-on: ubuntu-latest
    # [PERF] 안전 타임아웃: 최대 120분 (3000분/월 예산 고려)
    # 일일 평균 ~40-60분, 최악의 경우에도 120분 내 완료
    # 120분 * 30일 = 3600분이지만 대부분 60분 이내 종료하므로 예산 내 운영
    timeout-minutes: 120
    
    steps:

      # ============================================================
      # 환경 준비 (Setup) - 캐시 최대 활용으로 시간 절약
      # ============================================================

      - name: System Setup (Disk + Swap)
        run: |
          # [PERF] 디스크 정리를 백그라운드에서 실행 (스왑 생성과 병렬)
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL &
          
          # 스왑 생성 (정리와 병렬 진행 - 서로 다른 경로)
          if [ -f /swapfile ]; then
            sudo swapoff /swapfile 2>/dev/null || true
            sudo rm -f /swapfile
          fi
          sudo fallocate -l 8G /swapfile
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile
          
          # 백그라운드 정리 완료 대기
          wait
          echo "[OK] System setup complete (Swap 8GB)"
          free -h

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: data
          fetch-depth: 1

      # ============================================================
      # 의존성 설치 (Dependencies) - 캐시 활용 극대화
      # ============================================================

      - name: Cache Puppeteer Browser
        uses: actions/cache@v4
        with:
          path: ~/.cache/puppeteer
          key: ${{ runner.os }}-puppeteer-${{ hashFiles('backend/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-puppeteer-

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
          cache-dependency-path: backend/restaurant-crawling/scripts/requirements.txt

      # [PERF] RClone + Ollama 바이너리 캐시 (매번 다운로드 방지)
      - name: Cache RClone & Ollama
        id: cache-tools
        uses: actions/cache@v4
        with:
          path: |
            /usr/bin/rclone
            /usr/local/bin/ollama
          key: ${{ runner.os }}-tools-rclone-ollama-v2

      - name: Install RClone
        if: steps.cache-tools.outputs.cache-hit != 'true'
        run: |
          sudo -v ; curl -fsSL https://rclone.org/install.sh | sudo bash

      # [PERF] Python + Node 의존성 완전 병렬 설치
      - name: Install Dependencies (Python + Node.js)
        env:
          PUPPETEER_CACHE_DIR: /home/runner/.cache/puppeteer
        run: |
          # Python: pip upgrade + requirements 통합 (백그라운드)
          (python -m pip install --upgrade pip -q && \
           pip install -r backend/restaurant-crawling/scripts/requirements.txt -q) &
          PY_PID=$!
          
          # Node.js 의존성 (병렬)
          (cd backend && npm ci --prefer-offline) &
          NPM_PID=$!
          
          # Gemini CLI 전역 설치 (병렬)
          sudo npm install -g @google/gemini-cli -q &
          GEMINI_PID=$!
          
          # 모든 설치 완료 대기
          wait $PY_PID $NPM_PID $GEMINI_PID
          echo "[OK] All dependencies installed"

      # ============================================================
      # 자격 증명 설정 (Credentials) - 병렬 생성
      # ============================================================

      - name: Setup Credentials
        run: |
          mkdir -p backend/restaurant-crawling/data ~/.gemini ~/.config/rclone
          
          # Google Credentials
          echo "${{ secrets.GOOGLE_CREDENTIALS_BASE64 }}" | base64 -d > backend/restaurant-crawling/data/credentials.json
          
          # YouTube Cookies
          if [ -n "${{ secrets.YOUTUBE_COOKIES_TXT }}" ]; then
            echo "${{ secrets.YOUTUBE_COOKIES_TXT }}" > backend/restaurant-crawling/data/cookies.txt
          fi
          
          # Gemini Credentials
          if [ -n "${{ secrets.GEMINI_CREDENTIALS_BASE64 }}" ]; then
            echo "${{ secrets.GEMINI_CREDENTIALS_BASE64 }}" | base64 -d > ~/.gemini/oauth_creds.json
            chmod 600 ~/.gemini/oauth_creds.json
          fi
          
          # RClone Config
          if [ -n "${{ secrets.GDRIVE_RCLONE_CONFIG }}" ]; then
            echo "${{ secrets.GDRIVE_RCLONE_CONFIG }}" | base64 -d > ~/.config/rclone/rclone.conf
          fi
          
          echo "[OK] All credentials configured"

      # ============================================================
      # Ollama 설정 (AI Model) - 캐시 활용
      # ============================================================

      # [PERF] Ollama 모델 캐시를 Pull 전에 복원하여 ~2.5분 다운로드 시간 절약
      - name: Cache Ollama Models
        uses: actions/cache@v4
        with:
          path: ~/.ollama
          key: ${{ runner.os }}-ollama-models-v2
          restore-keys: |
            ${{ runner.os }}-ollama-models-

      - name: Setup Ollama
        if: steps.cache-tools.outputs.cache-hit != 'true'
        run: |
          curl -fsSL https://ollama.com/install.sh | sh
          echo "[OK] Ollama installed"

      - name: Start Ollama & Pull Model
        run: |
          ollama serve &
          
          # Ollama 준비 대기 (최적화된 폴링)
          for i in $(seq 1 15); do
            if curl -s http://localhost:11434/api/tags > /dev/null 2>&1; then
              echo "[OK] Ollama ready (${i}s)"
              break
            fi
            [ $i -eq 15 ] && { echo "[ERROR] Ollama timeout"; exit 1; }
            sleep 1
          done
          
          # 모델 Pull (캐시 히트 시 즉시 완료)
          ollama pull cookieshake/a.x-4.0-light-imatrix:Q8_0

      # ============================================================
      # 파이프라인 실행 (Main Pipeline)
      # ============================================================

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Run Daily Pipeline
        timeout-minutes: 100
        env:
          # API Keys
          YOUTUBE_API_KEY_BYEON: ${{ secrets.YOUTUBE_API_KEY_BYEON }}
          GEMINI_API_KEY_BYEON: ${{ secrets.GEMINI_API_KEY_BYEON }}
          GEMINI_CREDENTIALS_BASE64: ${{ secrets.GEMINI_CREDENTIALS_BASE64 }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Supabase
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          # Naver & NCP API
          NAVER_CLIENT_ID_BYEON: ${{ secrets.NAVER_CLIENT_ID_BYEON }}
          NAVER_CLIENT_SECRET_BYEON: ${{ secrets.NAVER_CLIENT_SECRET_BYEON }}
          NCP_MAPS_KEY_ID_BYEON: ${{ secrets.NCP_MAPS_KEY_ID_BYEON }}
          NCP_MAPS_KEY_BYEON: ${{ secrets.NCP_MAPS_KEY_BYEON }}
          # RClone / GDrive
          RCLONE_CONFIG_BASE64: ${{ secrets.GDRIVE_RCLONE_CONFIG }}
          GDRIVE_REMOTE_PATH: "gdrive:04_빠른공유/tzudong_tzuyang_data/video_cache"
          GDRIVE_FRAMES_PATH: "gdrive:04_빠른공유/tzudong_tzuyang_data/frames"
          # Ollama
          OLLAMA_HOST: http://localhost:11434
          # CI
          CI: true
          # [PERF] 자막 문맥 생성 배치 크기 (기본: 1, 메모리 보호)
          MAX_CONTEXT_VIDEOS: ${{ inputs.max_videos || '-1' }}
        run: |
          chmod +x backend/run_daily.sh
          bash backend/run_daily.sh
          
      # ============================================================
      # 후처리 (Post-processing) - 항상 실행
      # ============================================================

      - name: Add Job Summary
        if: always()
        run: |
          if [ -f summary.md ]; then
            cat summary.md >> $GITHUB_STEP_SUMMARY
          fi
          
      - name: Upload Results to GDrive
        if: always()
        env:
          GDRIVE_FRAMES_PATH: "gdrive:04_빠른공유/tzudong_tzuyang_data/frames"
        run: |
          if [ -d "backend/restaurant-crawling/data/frames" ]; then
            echo "Syncing frames to GDrive..."
            rclone copy "backend/restaurant-crawling/data/frames" "$GDRIVE_FRAMES_PATH" --progress
          else
            echo "No frames directory found, skipping upload."
          fi
