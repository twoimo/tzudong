name: Daily Data Collection

on:
  schedule:
    # 한국 시간(KST) 새벽 4시 = UTC 19:00
    - cron: '0 19 * * *'
  workflow_dispatch:
    inputs:
      max_videos:
        description: '자막 문맥 생성 개수 설정 (0=Unlimited, -1=Skip)'
        required: false
        default: '1'
        type: string

permissions:
  contents: write

jobs:
  daily-crawl:
    runs-on: ubuntu-latest
    
    steps:

      - name: Free Disk Space (Manual Fast)
        run: |
          # Fast cleanup of unused large packages (saves ~3-5 mins compared to action)
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL

      - name: Create Swap Space (12GB)
        run: |
          # Free Disk Space 액션 덕분에 공간이 확보되었으므로 스왑 생성 가능
          # 만약 이전 실행의 잔여물이 있다면 정리
          if [ -f /swapfile ]; then
            sudo swapoff /swapfile || true
            sudo rm -f /swapfile
          fi
          sudo fallocate -l 12G /swapfile
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile
          echo "[OK] Swap Created:"
          free -h

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: data
          fetch-depth: 1

      - name: Cache Puppeteer
        uses: actions/cache@v3
        with:
          path: ~/.cache/puppeteer
          key: ${{ runner.os }}-puppeteer-${{ hashFiles('backend/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-puppeteer-

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
          cache-dependency-path: backend/restaurant-crawling/scripts/requirements.txt



      - name: Install RClone
        run: |
          sudo -v ; curl https://rclone.org/install.sh | sudo bash

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/restaurant-crawling/scripts/requirements.txt

      - name: Install Node.js dependencies
        working-directory: ./backend
        env:
          PUPPETEER_CACHE_DIR: /home/runner/.cache/puppeteer
        run: |
          npm ci
          sudo npm install -g @google/gemini-cli

      - name: Create credentials.json
        run: |
          mkdir -p backend/restaurant-crawling/data
          echo "${{ secrets.GOOGLE_CREDENTIALS_BASE64 }}" | base64 -d > backend/restaurant-crawling/data/credentials.json

      - name: Create cookies.txt for yt-dlp
        run: |
          mkdir -p backend/restaurant-crawling/data
          if [ -n "${{ secrets.YOUTUBE_COOKIES_TXT }}" ]; then
            echo "${{ secrets.YOUTUBE_COOKIES_TXT }}" > backend/restaurant-crawling/data/cookies.txt
            echo "[OK] cookies.txt created from secret."
          else
            echo "[WARN] YOUTUBE_COOKIES_TXT secret is not set. Skipping cookie creation."
          fi

      - name: Setup Gemini Credentials
        run: |
          mkdir -p ~/.gemini
          if [ -n "${{ secrets.GEMINI_CREDENTIALS_BASE64 }}" ]; then
            echo "${{ secrets.GEMINI_CREDENTIALS_BASE64 }}" | base64 -d > ~/.gemini/oauth_creds.json
            chmod 600 ~/.gemini/oauth_creds.json
            echo "[OK] Gemini Credentials restored."
          else
            echo "[WARN] GEMINI_CREDENTIALS_BASE64 secret is missing."
          fi

      - name: Setup Ollama (CPU Mode)
        run: |
          echo "Installing Ollama..."
          curl -fsSL https://ollama.com/install.sh | sh
          
          echo "Starting Ollama server..."
          ollama serve &
          
      - name: Cache Ollama Models
        uses: actions/cache@v3
        with:
          path: ~/.ollama
          key: ${{ runner.os }}-ollama-models-v1
          restore-keys: |
            ${{ runner.os }}-ollama-models-

      - name: Pull Model
        run: |
          echo "Waiting for Ollama to be ready..."
          max_retries=10
          count=0
          while ! curl -s http://localhost:11434/api/tags > /dev/null; do
            count=$((count+1))
            if [ $count -eq $max_retries ]; then
              echo "Timeout waiting for Ollama!"
              exit 1
            fi
            sleep 2
          done
          echo "[OK] Ollama server is ready!"
          
          echo "Pulling model 'cookieshake/a.x-4.0-light-imatrix:Q8_0'..."
          # 모델 Pull (시간이 좀 걸릴 수 있음)
          ollama pull cookieshake/a.x-4.0-light-imatrix:Q8_0
          echo "[OK] Model pulled successfully!"

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Run Daily Pipeline
        env:
          # Secret에서 API 키 및 설정 주입
          YOUTUBE_API_KEY_BYEON: ${{ secrets.YOUTUBE_API_KEY_BYEON }}
          GEMINI_API_KEY_BYEON: ${{ secrets.GEMINI_API_KEY_BYEON }}
          GEMINI_CREDENTIALS_BASE64: ${{ secrets.GEMINI_CREDENTIALS_BASE64 }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Supabase 설정 (06.1 스크립트용)
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          # Naver & NCP API (08-rule-evaluation.py)
          NAVER_CLIENT_ID_BYEON: ${{ secrets.NAVER_CLIENT_ID_BYEON }}
          NAVER_CLIENT_SECRET_BYEON: ${{ secrets.NAVER_CLIENT_SECRET_BYEON }}
          NCP_MAPS_KEY_ID_BYEON: ${{ secrets.NCP_MAPS_KEY_ID_BYEON }}
          NCP_MAPS_KEY_BYEON: ${{ secrets.NCP_MAPS_KEY_BYEON }}
          # RClone 설정 (Base64 인코딩된 문자열을 Env로 전달 -> 스크립트에서 파일로 복원)
          RCLONE_CONFIG_BASE64: ${{ secrets.GDRIVE_RCLONE_CONFIG }}
          # GDrive 원격 경로 (영상 캐시 경로)
          GDRIVE_REMOTE_PATH: "gdrive:04_빠른공유/tzudong_tzuyang_data/video_cache"
          # 결과 저장 경로 (Frames)
          GDRIVE_FRAMES_PATH: "gdrive:04_빠른공유/tzudong_tzuyang_data/frames"
          # Ollama 호스트 (Self-Hosted Runner 또는 터널링 사용 시)
          OLLAMA_HOST: http://localhost:11434
          # CI 환경 플래그
          CI: true
          # [Config] 자막 문맥 생성 배치 크기 (Manual Default: 2, Schedule: 2)
          # 스케줄 실행 시 inputs가 없으므로 '2'가 적용됨 (메모리 부족 방지)
          MAX_CONTEXT_VIDEOS: ${{ inputs.max_videos || '1' }}
        run: |
          # 실행 권한 부여
          chmod +x backend/run_daily.sh
          # 스크립트 실행
          bash backend/run_daily.sh
          
      - name: Add Job Summary
        if: always()
        run: |
          if [ -f summary.md ]; then
            cat summary.md >> $GITHUB_STEP_SUMMARY
          fi
          
      - name: Upload Results to GDrive
        if: always() # 스크립트 실패 여부와 관계없이 저장 시도 (부분 결과라도 보존)
        env:
          RCLONE_CONFIG_BASE64: ${{ secrets.GDRIVE_RCLONE_CONFIG }}
          GDRIVE_FRAMES_PATH: "gdrive:04_빠른공유/tzudong_tzuyang_data/frames"
          # 로컬 Frames 경로 (스크립트 기준 backend/restaurant-crawling/data/tzuyang/frames 가 될 수 있음 - 확인 필요)
          # 일단 로컬 데이터 전체를 Sync 하는 것이 안전함.
        run: |
           # rclone 설정 복원 (위 단계에서 안 했을 경우 대비, 이미 했으면 생략 가능하지만 명시)
           mkdir -p ~/.config/rclone
           echo "${{ secrets.GDRIVE_RCLONE_CONFIG }}" | base64 -d > ~/.config/rclone/rclone.conf
           
           echo "=== DEBUG: File System Layout ==="
           ls -R backend/restaurant-crawling/data || echo "No data dir found"
           echo "================================="

           # 04 스크립트가 'backend/restaurant-crawling/data/tzuyang/frames' 에 결과 저장
           # 이 경로를 GDrive로 Sync
           
           if [ -d "backend/restaurant-crawling/data/frames" ]; then
             echo "Syncing frames to GDrive..."
             # 로컬: backend/restaurant-crawling/data/frames
             # 원격: gdrive:04_빠른공유/tzudong_tzuyang_data/frames
             rclone copy "backend/restaurant-crawling/data/frames" "${{ env.GDRIVE_FRAMES_PATH }}" --progress
           else
             echo "No frames directory found (backend/restaurant-crawling/data/frames), skipping upload."
           fi

