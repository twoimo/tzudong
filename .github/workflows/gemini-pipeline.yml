name: 🍜 GeminiCLI Restaurant Pipeline

on:
  workflow_dispatch:
    inputs:
      phase:
        description: '실행할 단계 선택'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - crawling
          - evaluation
          - transform
          - insert
  schedule:
    # 2일마다 KST 02:30 (UTC 17:30) 자동 실행
    - cron: '30 17 */2 * *'
  # push 트리거 비활성화 - 수동 실행(workflow_dispatch) 사용 권장
  # push:
  #   branches:
  #     - github-actions-restaurant

env:
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '20'
  TZ: 'Asia/Seoul'  # 한국 시간대 설정

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 180  # 3시간 타임아웃 (크롤링+평가 시간 고려)
    
    # 저장소 쓰기 권한 (자동 커밋용)
    permissions:
      contents: write
    
    steps:
      # ============================
      # 1. 기본 환경 설정
      # ============================
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
      
      - name: 🐍 Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: 'backend/requirements.txt'
      
      - name: 📦 Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/geminiCLI-restaurant-evaluation/package-lock.json
      
      # ============================
      # 2. 시스템 도구 설치
      # ============================
      - name: 🔧 Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq zsh
          echo "✅ jq 버전: $(jq --version)"
          echo "✅ zsh 버전: $(zsh --version)"
      
      # ============================
      # 3. Python 패키지 설치
      # ============================
      - name: 🐍 Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install requests python-dotenv google-api-python-client openai youtube-transcript-api
          echo "✅ Python 패키지 설치 완료"
      
      # ============================
      # 4. Node.js 패키지 설치
      # ============================
      - name: 📦 Install Node.js dependencies (Evaluation)
        working-directory: backend/geminiCLI-restaurant-evaluation
        run: |
          npm install
          echo "✅ Node.js 패키지 설치 완료"
      
      # ============================
      # 5. Gemini CLI 설치 (API 키 방식)
      # ============================
      - name: 🤖 Install Gemini CLI
        run: |
          # Gemini CLI 설치
          npm install -g @anthropic-ai/claude-code 2>/dev/null || true
          npm install -g @google/generative-ai-cli 2>/dev/null || true
          
          # Python SDK도 설치 (백업용)
          pip install google-generativeai
          
          echo "✅ Gemini 설정 완료"
      
      # ============================
      # 6. 환경 변수 파일 생성
      # ============================
      - name: 📝 Create .env files
        run: |
          # 메인 backend .env (Supabase + YouTube API + Gemini)
          cat > backend/.env << EOF
          YOUTUBE_API_KEY_BYEON=${{ secrets.YOUTUBE_API_KEY_BYEON }}
          OPENAI_API_KEY_BYEON=${{ secrets.OPENAI_API_KEY_BYEON }}
          GEMINI_API_KEY_BYEON=${{ secrets.GEMINI_API_KEY_BYEON }}
          SUPABASE_URL=${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          EOF
          
          # 크롤링 .env (복사)
          cp backend/.env backend/geminiCLI-restaurant-crawling/.env
          
          # 평가 .env (네이버 API 추가)
          cat > backend/geminiCLI-restaurant-evaluation/.env << EOF
          NAVER_CLIENT_ID_BYEON=${{ secrets.NAVER_CLIENT_ID_BYEON }}
          NAVER_CLIENT_SECRET_BYEON=${{ secrets.NAVER_CLIENT_SECRET_BYEON }}
          NCP_MAPS_KEY_ID_BYEON=${{ secrets.NCP_MAPS_KEY_ID_BYEON }}
          NCP_MAPS_KEY_BYEON=${{ secrets.NCP_MAPS_KEY_BYEON }}
          GEMINI_API_KEY_BYEON=${{ secrets.GEMINI_API_KEY_BYEON }}
          SUPABASE_URL=${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          EOF
          
          echo "✅ .env 파일 생성 완료"
      
      # ============================
      # 8. 스크립트 실행 권한 부여
      # ============================
      - name: 🔐 Set script permissions
        run: |
          chmod +x backend/geminiCLI-restaurant-crawling/scripts/*.sh
          chmod +x backend/geminiCLI-restaurant-evaluation/scripts/*.sh
          echo "✅ 스크립트 실행 권한 부여 완료"
      
      # ============================
      # 7-2. 파이프라인 날짜 폴더 설정
      # ============================
      - name: 📅 Set Pipeline Date Folder
        id: date_folder
        run: |
          # 파이프라인 시작 시점의 날짜를 환경변수로 설정 (yy-mm-dd)
          PIPELINE_DATE=$(date '+%y-%m-%d')
          echo "PIPELINE_DATE=$PIPELINE_DATE" >> $GITHUB_ENV
          echo "📅 파이프라인 날짜 폴더: $PIPELINE_DATE"
          
          # 데이터 폴더 생성
          mkdir -p backend/geminiCLI-restaurant-crawling/data/$PIPELINE_DATE
          mkdir -p backend/geminiCLI-restaurant-evaluation/data/$PIPELINE_DATE
          
          # 로그 폴더 생성 (새 구조: report/text/structured/supabase)
          mkdir -p backend/log/geminiCLI-restaurant/report/$PIPELINE_DATE
          mkdir -p backend/log/geminiCLI-restaurant/text/$PIPELINE_DATE
          mkdir -p backend/log/geminiCLI-restaurant/structured/$PIPELINE_DATE
          mkdir -p backend/log/geminiCLI-restaurant/supabase/$PIPELINE_DATE
          echo "✅ 데이터 및 로그 폴더 생성 완료"
      
      # ============================
      # 8. 전체 파이프라인 실행
      # ============================
      - name: 🚀 Run Full Pipeline
        if: ${{ github.event.inputs.phase == 'all' || github.event_name == 'schedule' }}
        working-directory: backend
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY_BYEON }}
          GOOGLE_API_KEY: ${{ secrets.GEMINI_API_KEY_BYEON }}
          PIPELINE_DATE: ${{ env.PIPELINE_DATE }}
        run: |
          echo "🍜 전체 파이프라인 시작..."
          echo "📅 파이프라인 날짜: $PIPELINE_DATE"
          echo "⏰ 시작 시간: $(date '+%Y-%m-%d %H:%M:%S')"
          python3 geminiCLI-restaurant-pipeline.py
          echo "⏰ 종료 시간: $(date '+%Y-%m-%d %H:%M:%S')"
      
      # ============================
      # 9. 개별 단계 실행 (수동 트리거용)
      # ============================
      - name: 🔍 Run Crawling Only
        if: ${{ github.event.inputs.phase == 'crawling' }}
        working-directory: backend/geminiCLI-restaurant-crawling/scripts
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY_BYEON }}
          GOOGLE_API_KEY: ${{ secrets.GEMINI_API_KEY_BYEON }}
          PIPELINE_DATE: ${{ env.PIPELINE_DATE }}
        run: |
          echo "📥 크롤링 단계 실행..."
          echo "📅 파이프라인 날짜: $PIPELINE_DATE"
          python3 crawling-pipeline.py
      
      - name: 📊 Run Evaluation Only
        if: ${{ github.event.inputs.phase == 'evaluation' }}
        working-directory: backend/geminiCLI-restaurant-evaluation/scripts
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY_BYEON }}
          GOOGLE_API_KEY: ${{ secrets.GEMINI_API_KEY_BYEON }}
          PIPELINE_DATE: ${{ env.PIPELINE_DATE }}
        run: |
          echo "📊 평가 단계 실행..."
          echo "📅 파이프라인 날짜: $PIPELINE_DATE"
          python3 evaluation-pipeline.py
      
      # ============================
      # 10. Transform 및 DB 삽입
      # ============================
      - name: 🔄 Run Transform Only
        if: ${{ github.event.inputs.phase == 'transform' }}
        working-directory: backend/geminiCLI-restaurant-evaluation/scripts
        env:
          PIPELINE_DATE: ${{ env.PIPELINE_DATE }}
        run: |
          echo "🔄 Transform 단계 실행..."
          echo "📅 파이프라인 날짜: $PIPELINE_DATE"
          python3 transform_evaluation_results.py
      
      - name: 💾 Run DB Insert Only
        if: ${{ github.event.inputs.phase == 'insert' }}
        working-directory: backend/geminiCLI-restaurant-evaluation
        env:
          PIPELINE_DATE: ${{ env.PIPELINE_DATE }}
        run: |
          echo "💾 DB 삽입 단계 실행..."
          echo "📅 파이프라인 날짜: $PIPELINE_DATE"
          npx tsx scripts/insert_to_supabase.ts
      
      # ============================
      # 11. 결과 파일 업로드
      # ============================
      - name: 📊 Upload Results as Artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pipeline-results-${{ github.run_number }}-${{ github.run_attempt }}
          path: |
            backend/geminiCLI-restaurant-crawling/data/**/*.jsonl
            backend/geminiCLI-restaurant-crawling/data/**/*.txt
            backend/geminiCLI-restaurant-crawling/data/**/*.log
            backend/geminiCLI-restaurant-evaluation/data/**/*.jsonl
            backend/geminiCLI-restaurant-evaluation/data/**/*.log
          retention-days: 30
          if-no-files-found: warn
      
      # ============================
      # 11-2. 로그 파일 업로드
      # ============================
      - name: 📋 Upload Log Files as Artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pipeline-logs-${{ github.run_number }}-${{ github.run_attempt }}
          path: |
            backend/log/geminiCLI-restaurant/report/**/*.json
            backend/log/geminiCLI-restaurant/text/**/*.log
            backend/log/geminiCLI-restaurant/structured/**/*.jsonl
            backend/log/geminiCLI-restaurant/supabase/**/*.json
          retention-days: 30
          if-no-files-found: warn
      
      # ============================
      # 12. 결과 통계 출력 (날짜별 폴더 구조)
      # ============================
      - name: 📈 Print Pipeline Statistics
        if: always()
        run: |
          echo ""
          echo "📊 =============================="
          echo "   파이프라인 결과 통계"
          echo "==============================="
          echo ""
          
          # 오늘 날짜 폴더
          TODAY=$(date '+%y-%m-%d')
          echo "📅 오늘 날짜 폴더: $TODAY"
          echo ""
          
          # 크롤링 결과 (날짜별 폴더)
          CRAWLING_DIR="backend/geminiCLI-restaurant-crawling/data"
          for folder in "$CRAWLING_DIR"/*; do
            if [ -d "$folder" ]; then
              FOLDER_NAME=$(basename "$folder")
              echo "📁 크롤링 폴더: $FOLDER_NAME"
              
              if [ -f "$folder/tzuyang_youtubeVideo_urls.txt" ]; then
                URL_COUNT=$(wc -l < "$folder/tzuyang_youtubeVideo_urls.txt" | tr -d ' ')
                echo "   📹 YouTube URL: $URL_COUNT 개"
              fi
              
              if [ -f "$folder/tzuyang_restaurant_results.jsonl" ]; then
                CRAWL_COUNT=$(wc -l < "$folder/tzuyang_restaurant_results.jsonl" | tr -d ' ')
                echo "   🍽️  크롤링 결과: $CRAWL_COUNT 개"
              fi
              
              if [ -f "$folder/tzuyang_restaurant_results_with_meta.jsonl" ]; then
                META_COUNT=$(wc -l < "$folder/tzuyang_restaurant_results_with_meta.jsonl" | tr -d ' ')
                echo "   📺 메타데이터 포함: $META_COUNT 개"
              fi
            fi
          done
          
          echo ""
          
          # 평가 결과 (날짜별 폴더)
          EVAL_DIR="backend/geminiCLI-restaurant-evaluation/data"
          for folder in "$EVAL_DIR"/*; do
            if [ -d "$folder" ]; then
              FOLDER_NAME=$(basename "$folder")
              echo "📁 평가 폴더: $FOLDER_NAME"
              
              if [ -f "$folder/tzuyang_restaurant_evaluation_selection.jsonl" ]; then
                SELECT_COUNT=$(wc -l < "$folder/tzuyang_restaurant_evaluation_selection.jsonl" | tr -d ' ')
                echo "   🎯 평가 대상 선정: $SELECT_COUNT 개"
              fi
              
              if [ -f "$folder/tzuyang_restaurant_evaluation_rule_results.jsonl" ]; then
                RULE_COUNT=$(wc -l < "$folder/tzuyang_restaurant_evaluation_rule_results.jsonl" | tr -d ' ')
                echo "   📏 RULE 평가 결과: $RULE_COUNT 개"
              fi
              
              if [ -f "$folder/tzuyang_restaurant_evaluation_results.jsonl" ]; then
                EVAL_COUNT=$(wc -l < "$folder/tzuyang_restaurant_evaluation_results.jsonl" | tr -d ' ')
                echo "   ✅ LAAJ 평가 성공: $EVAL_COUNT 개"
              fi
              
              if [ -f "$folder/tzuyang_restaurant_evaluation_errors.jsonl" ]; then
                ERROR_COUNT=$(wc -l < "$folder/tzuyang_restaurant_evaluation_errors.jsonl" | tr -d ' ')
                echo "   ❌ LAAJ 평가 에러: $ERROR_COUNT 개"
              fi
              
              if [ -f "$folder/tzuyang_restaurant_transforms.jsonl" ]; then
                TRANSFORM_COUNT=$(wc -l < "$folder/tzuyang_restaurant_transforms.jsonl" | tr -d ' ')
                echo "   🔄 Transform 완료: $TRANSFORM_COUNT 개"
              fi
            fi
          done
          
          echo ""
          echo "==============================="
          echo "✨ 통계 출력 완료"
          echo "==============================="
      
      # ============================
      # 13. 실행 결과 요약 (GitHub Summary)
      # ============================
      - name: 📝 Generate Job Summary
        if: always()
        run: |
          echo "# 🍜 GeminiCLI 파이프라인 실행 결과" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## 📅 실행 정보" >> $GITHUB_STEP_SUMMARY
          echo "- **실행 시간**: $(TZ=Asia/Seoul date '+%Y-%m-%d %H:%M:%S KST')" >> $GITHUB_STEP_SUMMARY
          echo "- **트리거**: ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **실행 단계**: ${{ github.event.inputs.phase || 'all (scheduled)' }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          echo "## 📊 처리 결과" >> $GITHUB_STEP_SUMMARY
          echo "| 단계 | 파일 | 개수 |" >> $GITHUB_STEP_SUMMARY
          echo "|------|------|------|" >> $GITHUB_STEP_SUMMARY
          
          # 결과 파일 개수 확인
          CRAWLING_DIR="backend/geminiCLI-restaurant-crawling"
          EVAL_DIR="backend/geminiCLI-restaurant-evaluation"
          LOG_DIR="backend/log/geminiCLI-restaurant"
          
          if [ -f "$CRAWLING_DIR/tzuyang_restaurant_results_with_meta.jsonl" ]; then
            COUNT=$(wc -l < "$CRAWLING_DIR/tzuyang_restaurant_results_with_meta.jsonl" | tr -d ' ')
            echo "| 크롤링 | 메타데이터 포함 | $COUNT |" >> $GITHUB_STEP_SUMMARY
          fi
          
          if [ -f "$EVAL_DIR/tzuyang_restaurant_evaluation_results.jsonl" ]; then
            COUNT=$(wc -l < "$EVAL_DIR/tzuyang_restaurant_evaluation_results.jsonl" | tr -d ' ')
            echo "| 평가 | 성공 | $COUNT |" >> $GITHUB_STEP_SUMMARY
          fi
          
          if [ -f "$EVAL_DIR/tzuyang_restaurant_evaluation_errors.jsonl" ]; then
            COUNT=$(wc -l < "$EVAL_DIR/tzuyang_restaurant_evaluation_errors.jsonl" | tr -d ' ')
            echo "| 평가 | 에러 | $COUNT |" >> $GITHUB_STEP_SUMMARY
          fi
          
          if [ -f "$EVAL_DIR/tzuyang_restaurant_transforms.jsonl" ]; then
            COUNT=$(wc -l < "$EVAL_DIR/tzuyang_restaurant_transforms.jsonl" | tr -d ' ')
            echo "| Transform | 완료 | $COUNT |" >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # 로그 파일에서 상세 통계 추출
          echo "## ⏱️ 단계별 소요 시간" >> $GITHUB_STEP_SUMMARY
          echo "| 단계 | 소요 시간 | 시작 | 종료 |" >> $GITHUB_STEP_SUMMARY
          echo "|------|----------|------|------|" >> $GITHUB_STEP_SUMMARY
          
          # 오늘 날짜 폴더의 로그 파일 확인 (새 구조: report 폴더)
          TODAY=$(date '+%y-%m-%d')
          for log_file in "$LOG_DIR/report/$TODAY"/*.json; do
            if [ -f "$log_file" ]; then
              STAGE=$(jq -r '.stage // "unknown"' "$log_file" 2>/dev/null)
              DURATION=$(jq -r '.duration_formatted // "N/A"' "$log_file" 2>/dev/null)
              STARTED=$(jq -r '.started_at // "N/A"' "$log_file" 2>/dev/null)
              ENDED=$(jq -r '.ended_at // "N/A"' "$log_file" 2>/dev/null)
              echo "| $STAGE | $DURATION | $STARTED | $ENDED |" >> $GITHUB_STEP_SUMMARY
            fi
          done
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## 📋 상세 통계" >> $GITHUB_STEP_SUMMARY
          
          # 각 로그 파일의 통계 출력
          for log_file in "$LOG_DIR/report/$TODAY"/*.json; do
            if [ -f "$log_file" ]; then
              STAGE=$(jq -r '.stage // "unknown"' "$log_file" 2>/dev/null)
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "### $STAGE" >> $GITHUB_STEP_SUMMARY
              echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
              jq -r '.statistics | to_entries | .[] | "  \(.key): \(.value)"' "$log_file" 2>/dev/null >> $GITHUB_STEP_SUMMARY || echo "  (통계 없음)" >> $GITHUB_STEP_SUMMARY
              echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
            fi
          done
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "📁 아티팩트에서 상세 로그를 확인하세요." >> $GITHUB_STEP_SUMMARY
      
      # ============================
      # 14. 결과 파일 자동 커밋 (중복 검사용)
      # ============================
      - name: 📤 Commit results to repository
        if: ${{ success() && (github.event_name == 'schedule' || github.event.inputs.phase == 'all') }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # 오늘 날짜 폴더
          TODAY=$(date '+%y-%m-%d')
          
          # 크롤링 데이터 폴더 추가
          git add backend/geminiCLI-restaurant-crawling/data/ 2>/dev/null || true
          
          # 평가 데이터 폴더 추가
          git add backend/geminiCLI-restaurant-evaluation/data/ 2>/dev/null || true
          
          # 로그 폴더 추가
          git add backend/log/geminiCLI-restaurant/ 2>/dev/null || true
          
          # 변경사항이 있을 때만 커밋
          if git diff --staged --quiet; then
            echo "📭 변경사항 없음 - 커밋 스킵"
          else
            COMMIT_MSG="🤖 Auto-update: Pipeline results $TODAY"
            git commit -m "$COMMIT_MSG"
            git push
            echo "✅ 결과 파일 커밋 완료: $COMMIT_MSG"
          fi
