name: 🔐 Gemini OAuth 토큰 자동 갱신

on:
  # 40분마다 토큰 갱신 (토큰은 1시간 유효)
  schedule:
    - cron: "*/40 * * * *"
  
  # 수동 실행 가능
  workflow_dispatch:

env:
  TZ: "Asia/Seoul"

jobs:
  refresh-oauth-token:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    permissions:
      contents: write

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🤖 Install Gemini CLI
        run: |
          npm install -g @google/gemini-cli
          echo "✅ Gemini CLI: $(gemini --version)"

      - name: 🔐 Setup OAuth credentials
        run: |
          # 로컬 .gemini 폴더를 ~/.gemini로 복사
          mkdir -p ~/.gemini
          
          GEMINI_DIR="backend/youtuber-restaurant-crawler/.gemini"
          
          # 모든 설정 파일 복사
          [ -f "$GEMINI_DIR/oauth_creds.json" ] && cp "$GEMINI_DIR/oauth_creds.json" ~/.gemini/
          [ -f "$GEMINI_DIR/settings.json" ] && cp "$GEMINI_DIR/settings.json" ~/.gemini/
          [ -f "$GEMINI_DIR/google_accounts.json" ] && cp "$GEMINI_DIR/google_accounts.json" ~/.gemini/
          [ -f "$GEMINI_DIR/state.json" ] && cp "$GEMINI_DIR/state.json" ~/.gemini/
          
          echo "📁 ~/.gemini 설정됨:"
          ls -la ~/.gemini/
          
          # 현재 토큰 만료 시간 확인
          if [ -f ~/.gemini/oauth_creds.json ]; then
            EXPIRY=$(jq -r '.expiry_date // 0' ~/.gemini/oauth_creds.json)
            EXPIRY_DATE=$(date -d @$((EXPIRY/1000)) '+%Y-%m-%d %H:%M:%S KST' 2>/dev/null || echo "알 수 없음")
            echo "⏰ 갱신 전 만료 시간: $EXPIRY_DATE"
          fi

      - name: 🔄 Refresh token by running Gemini CLI
        run: |
          echo "🤖 Gemini CLI 실행하여 토큰 갱신..."
          
          # API 키 환경변수 제거 (OAuth만 사용)
          unset GEMINI_API_KEY GOOGLE_API_KEY
          
          # 현재 시간 기반 프롬프트 생성 (매번 다른 내용)
          CURRENT_TIME=$(TZ=Asia/Seoul date '+%Y년 %m월 %d일 %H시 %M분')
          PROMPT="현재 시간은 ${CURRENT_TIME}입니다. 오늘의 운세를 한 문장으로 알려주세요."
          
          echo "📝 프롬프트: $PROMPT"
          
          # Gemini CLI 실행 (토큰 자동 갱신됨)
          timeout 60 gemini -p "$PROMPT" --model gemini-2.5-flash 2>&1 || true
          
          echo ""
          echo "✅ Gemini CLI 실행 완료"
          
          # 갱신된 토큰 만료 시간 확인
          if [ -f ~/.gemini/oauth_creds.json ]; then
            EXPIRY=$(jq -r '.expiry_date // 0' ~/.gemini/oauth_creds.json)
            EXPIRY_DATE=$(date -d @$((EXPIRY/1000)) '+%Y-%m-%d %H:%M:%S KST' 2>/dev/null || echo "알 수 없음")
            echo "⏰ 갱신 후 만료 시간: $EXPIRY_DATE"
          fi

      - name: 📤 Copy back and commit
        run: |
          GEMINI_DIR="backend/youtuber-restaurant-crawler/.gemini"
          
          # 갱신된 토큰을 저장소로 복사
          [ -f ~/.gemini/oauth_creds.json ] && cp ~/.gemini/oauth_creds.json "$GEMINI_DIR/"
          
          # Git 설정 및 커밋
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git add "$GEMINI_DIR/oauth_creds.json" 2>/dev/null || true
          
          if git diff --staged --quiet; then
            echo "📭 토큰 변경사항 없음 (이미 최신)"
          else
            COMMIT_MSG="🔐 Auto: Gemini OAuth 토큰 갱신 ($(TZ=Asia/Seoul date '+%Y-%m-%d %H:%M KST'))"
            git commit -m "$COMMIT_MSG"
            git push
            echo "✅ 토큰 커밋 완료"
          fi

      - name: 📝 Summary
        if: always()
        run: |
          echo "# 🔐 Gemini OAuth 토큰 갱신" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **실행 시간**: $(TZ=Asia/Seoul date '+%Y-%m-%d %H:%M:%S KST')" >> $GITHUB_STEP_SUMMARY
          
          OAUTH_FILE="backend/youtuber-restaurant-crawler/.gemini/oauth_creds.json"
          if [ -f "$OAUTH_FILE" ]; then
            EXPIRY=$(jq -r '.expiry_date // 0' "$OAUTH_FILE")
            EXPIRY_DATE=$(date -d @$((EXPIRY/1000)) '+%Y-%m-%d %H:%M:%S KST' 2>/dev/null || echo "알 수 없음")
            echo "- **토큰 만료 시간**: $EXPIRY_DATE" >> $GITHUB_STEP_SUMMARY
          fi
