name: 🔐 Gemini OAuth 토큰 자동 갱신

on:
  # 30분마다 실행 + 랜덤 딜레이로 실제 30~50분 간격
  schedule:
    - cron: "*/30 * * * *"  # 30분마다 트리거
  
  # 수동 실행 가능
  workflow_dispatch:
    inputs:
      force_refresh:
        description: "강제 갱신 (만료 여부 무관)"
        required: false
        default: "false"
        type: boolean
      skip_delay:
        description: "랜덤 딜레이 스킵"
        required: false
        default: "true"
        type: boolean

env:
  NODE_VERSION: "20"
  TZ: "Asia/Seoul"

jobs:
  refresh-oauth-token:
    runs-on: ubuntu-latest
    timeout-minutes: 30  # 딜레이 포함하여 타임아웃 증가

    permissions:
      contents: write

    steps:
      - name: ⏰ Random delay (30-50분 간격 분산)
        if: github.event_name == 'schedule'
        run: |
          # 0~20분(0~1200초) 사이의 랜덤 딜레이
          DELAY=$((RANDOM % 1200))
          DELAY_MIN=$((DELAY / 60))
          DELAY_SEC=$((DELAY % 60))
          echo "🎲 랜덤 딜레이: ${DELAY_MIN}분 ${DELAY_SEC}초 (총 ${DELAY}초)"
          echo "⏳ 대기 중..."
          sleep $DELAY
          echo "✅ 딜레이 완료, 토큰 갱신 시작"

      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 📦 Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: 📦 Install dependencies
        working-directory: backend/youtuber-restaurant-crawler
        run: npm install

      - name: 🔐 Refresh OAuth Token
        working-directory: backend/youtuber-restaurant-crawler
        env:
          FORCE_REFRESH: ${{ github.event.inputs.force_refresh || 'false' }}
        run: |
          echo "🔐 Gemini OAuth 토큰 갱신 시작..."
          echo "강제 갱신: $FORCE_REFRESH"
          echo ""
          
          # 로컬 .gemini 폴더 확인
          echo "📁 로컬 .gemini 폴더 확인:"
          ls -la .gemini/ || echo "폴더 없음"
          echo ""
          
          # 토큰 갱신 스크립트 실행
          node scripts/gemini-oauth-manager.js
          
          echo ""
          echo "📁 ~/.gemini 폴더 확인:"
          ls -la ~/.gemini/ || echo "폴더 없음"
          echo ""
          echo "✅ 토큰 갱신 완료"

      - name: 📤 Commit updated OAuth credentials
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # 변경사항 추가 (.gemini 폴더 내 oauth_creds.json)
          git add backend/youtuber-restaurant-crawler/.gemini/oauth_creds.json 2>/dev/null || true
          
          if git diff --staged --quiet; then
            echo "📭 OAuth 크레덴셜 변경사항 없음"
          else
            COMMIT_MSG="🔐 Auto: Gemini OAuth 토큰 갱신 ($(TZ=Asia/Seoul date '+%Y-%m-%d %H:%M KST'))"
            git commit -m "$COMMIT_MSG"
            git push
            echo "✅ OAuth 크레덴셜 커밋 완료"
          fi

      - name: 📝 Generate Summary
        if: always()
        run: |
          echo "# 🔐 Gemini OAuth 토큰 갱신 결과" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **실행 시간**: $(TZ=Asia/Seoul date '+%Y-%m-%d %H:%M:%S KST')" >> $GITHUB_STEP_SUMMARY
          echo "- **트리거**: ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          
          OAUTH_FILE="backend/youtuber-restaurant-crawler/.gemini/oauth_creds.json"
          if [ -f "$OAUTH_FILE" ]; then
            EXPIRY=$(jq -r '.expiry_date // 0' "$OAUTH_FILE")
            EXPIRY_DATE=$(date -d @$((EXPIRY/1000)) '+%Y-%m-%d %H:%M:%S KST' 2>/dev/null || echo "알 수 없음")
            echo "- **토큰 만료 시간**: $EXPIRY_DATE" >> $GITHUB_STEP_SUMMARY
          fi
