name: 🔐 Gemini OAuth 토큰 자동 갱신

on:
  schedule:
    - cron: "*/55 * * * *"  # 55분마다 (토큰 60분 유효)
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: 🔄 Refresh Token
        run: |
          GEMINI_DIR="backend/youtuber-restaurant-crawler/.gemini"
          
          # Gemini CLI 설치
          npm install -g @google/gemini-cli --silent
          
          # OAuth 설정 복사
          mkdir -p ~/.gemini
          cp "$GEMINI_DIR"/*.json ~/.gemini/ 2>/dev/null || true
          
          # 토큰 갱신 (CLI 실행 시 자동 갱신됨)
          unset GEMINI_API_KEY GOOGLE_API_KEY
          echo "1+1" | timeout 20 gemini --model gemini-2.5-flash 2>&1 | head -3 || true
          
          # 갱신된 토큰 복사
          cp ~/.gemini/oauth_creds.json "$GEMINI_DIR/" 2>/dev/null || true
          
          # 만료 시간 출력
          EXPIRY=$(jq -r '.expiry_date // 0' "$GEMINI_DIR/oauth_creds.json")
          echo "✅ 만료: $(date -d @$((EXPIRY/1000)) '+%m/%d %H:%M KST')"

      - name: 📤 Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add backend/youtuber-restaurant-crawler/.gemini/oauth_creds.json 2>/dev/null || true
          git diff --staged --quiet || (git commit -m "🔐 토큰 갱신" && git push)
