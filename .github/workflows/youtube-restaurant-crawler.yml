name: 🥩 유튜버 맛집 크롤링 (정육왕)

on:
  workflow_dispatch:
    inputs:
      start_from:
        description: "시작 단계"
        required: false
        default: "5"
        type: choice
        options:
          - "1"
          - "2"
          - "3"
          - "4"
          - "5"
  schedule:
    - cron: "0 15 * * 6"

env:
  BUN_VERSION: "1.1.38"
  TZ: "Asia/Seoul"

jobs:
  crawl-youtuber-restaurants:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: write

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: 🍞 Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: 📦 Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            backend/youtuber-restaurant-crawler/node_modules
          key: bun-${{ runner.os }}-${{ hashFiles('backend/youtuber-restaurant-crawler/package.json') }}

      - name: 📦 Install dependencies
        working-directory: backend/youtuber-restaurant-crawler
        run: bun install

      - name: 🤖 Install Gemini CLI
        run: |
          npm install -g @google/gemini-cli
          echo "✅ Gemini CLI: $(gemini --version)"

      - name: 🔐 Setup OAuth
        working-directory: backend/youtuber-restaurant-crawler
        run: |
          unset GEMINI_API_KEY GEMINI_API_KEY_BYEON GOOGLE_API_KEY
          bun run scripts/gemini-oauth-manager.js
          [ -f ~/.gemini/oauth_creds.json ] && echo "✅ OAuth OK"

      - name: 📝 Setup env
        working-directory: backend/youtuber-restaurant-crawler
        run: |
          cat > .env << EOF
          YOUTUBE_API_KEY=${{ secrets.YOUTUBE_API_KEY_BYEON }}
          KAKAO_REST_API_KEY=${{ secrets.KAKAO_REST_API_KEY }}
          SUPABASE_URL=${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          EOF

      - name: 📅 Setup pipeline
        run: |
          PIPELINE_DATE=$(TZ=Asia/Seoul date '+%y-%m-%d')
          echo "PIPELINE_DATE=$PIPELINE_DATE" >> $GITHUB_ENV
          mkdir -p backend/youtuber-restaurant-crawler/data/$PIPELINE_DATE
          
          START_FROM="${{ github.event.inputs.start_from || '5' }}"
          echo "START_FROM=$START_FROM" >> $GITHUB_ENV
          echo "🚀 Mode: $START_FROM (5=전체)"
          
          RESTAURANTS_FILE="backend/youtuber-restaurant-crawler/data/$PIPELINE_DATE/meatcreator_restaurants.jsonl"
          [ -f "$RESTAURANTS_FILE" ] && echo "📊 기존: $(wc -l < "$RESTAURANTS_FILE")개"

      - name: 🚀 Full Pipeline (Mode 5)
        if: ${{ env.START_FROM == '5' || env.START_FROM == '' }}
        working-directory: backend/youtuber-restaurant-crawler
        env:
          PIPELINE_DATE: ${{ env.PIPELINE_DATE }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY_BYEON }}
          KAKAO_REST_API_KEY: ${{ secrets.KAKAO_REST_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GEMINI_MODEL: "gemini-2.5-pro"
        run: |
          unset GEMINI_API_KEY GEMINI_API_KEY_BYEON GOOGLE_API_KEY
          echo "═══════════════════════════════════════"
          echo "🚀 전체 파이프라인 (중간 커밋 없음)"
          echo "═══════════════════════════════════════"
          bun run scripts/crawl-channel.js
          bun run scripts/extract-addresses.js
          bun run scripts/enrich-coordinates.js
          bun run scripts/insert-to-supabase.js
          echo "✅ 완료!"

      - name: 📺 Phase 1 (Mode 1)
        if: ${{ env.START_FROM == '1' }}
        working-directory: backend/youtuber-restaurant-crawler
        env:
          PIPELINE_DATE: ${{ env.PIPELINE_DATE }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY_BYEON }}
        run: bun run scripts/crawl-channel.js

      - name: 💾 Commit 1
        if: ${{ env.START_FROM == '1' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add backend/youtuber-restaurant-crawler/data/${{ env.PIPELINE_DATE }}/*.json 2>/dev/null || true
          if ! git diff --staged --quiet; then
            git commit -m "📺 Phase 1 (${{ env.PIPELINE_DATE }})"
            git push
          fi

      - name: 🤖 Phase 2 (Mode 2)
        if: ${{ env.START_FROM == '2' }}
        working-directory: backend/youtuber-restaurant-crawler
        env:
          PIPELINE_DATE: ${{ env.PIPELINE_DATE }}
          KAKAO_REST_API_KEY: ${{ secrets.KAKAO_REST_API_KEY }}
          GEMINI_MODEL: "gemini-2.5-pro"
        run: |
          unset GEMINI_API_KEY GEMINI_API_KEY_BYEON GOOGLE_API_KEY
          bun run scripts/extract-addresses.js

      - name: 💾 Commit 2
        if: ${{ env.START_FROM == '2' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add backend/youtuber-restaurant-crawler/data/${{ env.PIPELINE_DATE }}/*.jsonl 2>/dev/null || true
          if ! git diff --staged --quiet; then
            git commit -m "🤖 Phase 2 (${{ env.PIPELINE_DATE }})"
            git push
          fi

      - name: 🗺️ Phase 3 (Mode 3)
        if: ${{ env.START_FROM == '3' }}
        working-directory: backend/youtuber-restaurant-crawler
        env:
          PIPELINE_DATE: ${{ env.PIPELINE_DATE }}
          KAKAO_REST_API_KEY: ${{ secrets.KAKAO_REST_API_KEY }}
        run: bun run scripts/enrich-coordinates.js

      - name: 💾 Commit 3
        if: ${{ env.START_FROM == '3' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add backend/youtuber-restaurant-crawler/data/${{ env.PIPELINE_DATE }}/*.jsonl 2>/dev/null || true
          if ! git diff --staged --quiet; then
            git commit -m "🗺️ Phase 3 (${{ env.PIPELINE_DATE }})"
            git push
          fi

      - name: 💾 Phase 4 (Mode 4)
        if: ${{ env.START_FROM == '4' }}
        working-directory: backend/youtuber-restaurant-crawler
        env:
          PIPELINE_DATE: ${{ env.PIPELINE_DATE }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: bun run scripts/insert-to-supabase.js

      - name: 📤 Final Commit
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add backend/youtuber-restaurant-crawler/data/ 2>/dev/null || true
          git add backend/youtuber-restaurant-crawler/.gemini/oauth_creds.json 2>/dev/null || true
          if ! git diff --staged --quiet; then
            git commit -m "🥩 완료 (${{ env.PIPELINE_DATE }}) [Mode ${{ env.START_FROM }}]"
            git push
          fi

      - name: 📝 Summary
        if: always()
        run: |
          echo "# 🥩 결과" >> $GITHUB_STEP_SUMMARY
          echo "| 항목 | 값 |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Mode | ${{ env.START_FROM }} |" >> $GITHUB_STEP_SUMMARY
          VIDEOS_FILE="backend/youtuber-restaurant-crawler/data/${{ env.PIPELINE_DATE }}/meatcreator_videos.json"
          [ -f "$VIDEOS_FILE" ] && echo "| 영상 | $(jq '.stats.totalVideos // 0' "$VIDEOS_FILE") |" >> $GITHUB_STEP_SUMMARY
          RESTAURANTS_FILE="backend/youtuber-restaurant-crawler/data/${{ env.PIPELINE_DATE }}/meatcreator_restaurants.jsonl"
          [ -f "$RESTAURANTS_FILE" ] && echo "| 처리 | $(wc -l < "$RESTAURANTS_FILE") |" >> $GITHUB_STEP_SUMMARY
