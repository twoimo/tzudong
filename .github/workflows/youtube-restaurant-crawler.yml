name: 🥩 유튜버 맛집 크롤링 (정육왕)

on:
  workflow_dispatch:
    inputs:
      start_from:
        description: "시작 단계 (1: 크롤링, 2: 주소추출, 3: DB저장)"
        required: false
        default: "1"
        type: choice
        options:
          - "1"
          - "2"
          - "3"
  schedule:
    # 매주 일요일 00:00 KST (토요일 15:00 UTC)
    - cron: "0 15 * * 6"

env:
  NODE_VERSION: "20"
  TZ: "Asia/Seoul"

jobs:
  crawl-youtuber-restaurants:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    permissions:
      contents: write

    steps:
      # ============================
      # 1. 기본 환경 설정
      # ============================
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 📦 Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: backend/youtuber-restaurant-crawler/package.json

      # ============================
      # 2. Node.js 패키지 설치
      # ============================
      - name: 📦 Install Node.js dependencies
        working-directory: backend/youtuber-restaurant-crawler
        run: |
          npm install
          echo "✅ Node.js 패키지 설치 완료"

      # ============================
      # 3. Gemini CLI 설치
      # ============================
      - name: 🤖 Install Gemini CLI
        run: |
          npm install -g @google/gemini-cli
          echo "✅ Gemini CLI 설치 완료: $(gemini --version)"

      # ============================
      # 4. OAuth 토큰 자동 갱신 (핵심!)
      # ============================
      - name: 🔐 Refresh OAuth Token (Auto)
        working-directory: backend/youtuber-restaurant-crawler
        run: |
          echo "🔐 OAuth 토큰 자동 갱신 시작..."
          node scripts/gemini-oauth-manager.js
          echo ""
          echo "📁 ~/.gemini 디렉토리 확인:"
          ls -la ~/.gemini/ || echo "디렉토리 없음"

      # ============================
      # 6. 환경 변수 파일 생성
      # ============================
      - name: 📝 Create .env file
        working-directory: backend/youtuber-restaurant-crawler
        run: |
          cat > .env << 'ENVEOF'
          YOUTUBE_API_KEY=${{ secrets.YOUTUBE_API_KEY_BYEON }}
          YOUTUBE_API_KEY_BYEON=${{ secrets.YOUTUBE_API_KEY_BYEON }}
          KAKAO_REST_API_KEY=${{ secrets.KAKAO_REST_API_KEY }}
          SUPABASE_URL=${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ENVEOF

          echo "✅ .env 파일 생성 완료"
          echo "📝 .env 내용 확인:"
          cat .env | while read line; do
            key=$(echo "$line" | cut -d'=' -f1)
            val=$(echo "$line" | cut -d'=' -f2-)
            if [ -n "$val" ]; then
              echo "   $key=***설정됨*** (길이: ${#val})"
            else
              echo "   $key=(비어있음)"
            fi
          done

      # ============================
      # 7. 파이프라인 날짜 폴더 설정
      # ============================
      - name: 📅 Set Pipeline Date Folder
        run: |
          PIPELINE_DATE=$(TZ=Asia/Seoul date '+%y-%m-%d')
          echo "PIPELINE_DATE=$PIPELINE_DATE" >> $GITHUB_ENV
          echo "📅 파이프라인 날짜 폴더: $PIPELINE_DATE"

          mkdir -p backend/youtuber-restaurant-crawler/data/$PIPELINE_DATE
          mkdir -p backend/log/youtuber-restaurant-crawler/$PIPELINE_DATE
          echo "✅ 폴더 생성 완료"

      # ============================
      # 8. 파이프라인 실행
      # ============================
      - name: 🚀 Run Youtuber Restaurant Pipeline
        working-directory: backend/youtuber-restaurant-crawler
        env:
          PIPELINE_DATE: ${{ env.PIPELINE_DATE }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY_BYEON }}
          YOUTUBE_API_KEY_BYEON: ${{ secrets.YOUTUBE_API_KEY_BYEON }}
          KAKAO_REST_API_KEY: ${{ secrets.KAKAO_REST_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GEMINI_MODEL: "gemini-3.0-pro-preview"
        run: |
          START_FROM="${{ github.event.inputs.start_from || '1' }}"
          echo "🚀 파이프라인 시작 (단계: $START_FROM부터)"
          echo "🤖 Gemini 모델: $GEMINI_MODEL"

          node scripts/pipeline.js --start-from=$START_FROM

      # ============================
      # 9. 결과 파일 업로드
      # ============================
      - name: 📊 Upload Results as Artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: youtuber-restaurant-results-${{ github.run_number }}
          path: |
            backend/youtuber-restaurant-crawler/data/**/*.json
            backend/youtuber-restaurant-crawler/data/**/*.jsonl
            backend/log/youtuber-restaurant-crawler/**/*.json
          retention-days: 30
          if-no-files-found: warn

      # ============================
      # 10. 결과 커밋
      # ============================
      - name: 📤 Commit results
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # 변경사항 추가
          git add backend/youtuber-restaurant-crawler/data/ 2>/dev/null || true
          git add backend/log/youtuber-restaurant-crawler/ 2>/dev/null || true
          git add backend/oauth_creds.json 2>/dev/null || true

          if git diff --staged --quiet; then
            echo "📭 변경사항 없음"
          else
            COMMIT_MSG="🥩 Auto: 정육왕 맛집 크롤링 완료 (${{ env.PIPELINE_DATE }})"
            git commit -m "$COMMIT_MSG"
            git push
            echo "✅ 결과 커밋 완료"
          fi

      # ============================
      # 11. Job Summary
      # ============================
      - name: 📝 Generate Job Summary
        if: always()
        run: |
          echo "# 🥩 유튜버 맛집 크롤링 결과" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## 📅 실행 정보" >> $GITHUB_STEP_SUMMARY
          echo "- **실행 시간**: $(TZ=Asia/Seoul date '+%Y-%m-%d %H:%M:%S KST')" >> $GITHUB_STEP_SUMMARY
          echo "- **트리거**: ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **시작 단계**: ${{ github.event.inputs.start_from || '1' }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # 결과 파일 통계
          echo "## 📊 처리 결과" >> $GITHUB_STEP_SUMMARY

          VIDEOS_FILE="backend/youtuber-restaurant-crawler/data/${{ env.PIPELINE_DATE }}/meatcreator_videos.json"
          if [ -f "$VIDEOS_FILE" ]; then
            VIDEO_COUNT=$(jq '.stats.totalVideos // 0' "$VIDEOS_FILE")
            MAP_URL_COUNT=$(jq '.stats.videosWithMapUrl // 0' "$VIDEOS_FILE")
            echo "- **총 영상 수**: $VIDEO_COUNT 개" >> $GITHUB_STEP_SUMMARY
            echo "- **지도 URL 포함**: $MAP_URL_COUNT 개" >> $GITHUB_STEP_SUMMARY
          fi

          RESTAURANTS_FILE="backend/youtuber-restaurant-crawler/data/${{ env.PIPELINE_DATE }}/meatcreator_restaurants.jsonl"
          if [ -f "$RESTAURANTS_FILE" ]; then
            TOTAL_RESTAURANTS=$(cat "$RESTAURANTS_FILE" | jq -s '[.[].restaurants | length] | add // 0')
            echo "- **추출된 맛집**: $TOTAL_RESTAURANTS 개" >> $GITHUB_STEP_SUMMARY
          fi
