name: Backfill Duration (Manual)

on:
  workflow_dispatch:
    inputs:
      date:
        description: '특정 날짜 폴더만 처리 (예: 25-12-03)'
        required: false
        default: ''
      max:
        description: '최대 처리 개수'
        required: false
        default: ''
      dry_run:
        description: '테스트 실행 (실제 저장 안함)'
        required: false
        type: boolean
        default: false

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 1200

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Pull latest changes
        run: |
          git pull origin ${{ github.ref_name }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: backend/geminiCLI-restaurant-crawling
        run: |
          npm install puppeteer typescript ts-node @types/node
          echo "✅ 의존성 설치 완료"

      - name: Install Puppeteer browser
        working-directory: backend/geminiCLI-restaurant-crawling
        run: npx puppeteer browsers install chrome

      - name: Run backfill script
        working-directory: backend/geminiCLI-restaurant-crawling
        run: |
          ARGS=""
          if [ -n "${{ github.event.inputs.date }}" ]; then
            ARGS="$ARGS --date ${{ github.event.inputs.date }}"
          fi
          if [ -n "${{ github.event.inputs.max }}" ]; then
            ARGS="$ARGS --max ${{ github.event.inputs.max }}"
          fi
          if [ "${{ github.event.inputs.dry_run }}" == "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          echo "Running: npx ts-node scripts/backfill-duration-puppeteer.ts $ARGS"
          npx ts-node scripts/backfill-duration-puppeteer.ts $ARGS

      - name: Commit and push changes
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add -A
          git diff --staged --quiet || git commit -m "chore: backfill transcript duration data [skip ci]"
          git push
